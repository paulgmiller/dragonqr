{{template "head" .}}
<section class="print-title">
  <h1>{{.Quest.Title}} QR Codes</h1>
  <p>Cut out each reusable card and place it by matching its stable ID in the organizer view.</p>
</section>

<section class="print-grid">
  {{range .Codes}}
    <article class="qr-card">
      <img class="qr-image" src="{{.QR}}" alt="QR code for {{.ID}}">
      <h2>{{.ID}}</h2>
    </article>
  {{end}}
</section>
{{template "foot" .}}
