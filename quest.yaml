title: "Neon War for Sector Ember"
intro: "A rogue AI war machine has seized the Ember Sector watchtower. Recruit pilots, upgrade your combat rig, and gather futuristic weapons before facing it."
start_code: start
dragon_code: ember-dragon
base_health: 10
base_attack: 2
base_armor: 0

dragon_requirements:
  min_attack: 8
  min_armor: 5
  min_companions: 2
  defeated:
    - cave-bat
    - bridge-troll
    - ash-wolf

victory_text: "The Overlord Titan powers down, its red optic fading to blue as it agrees to defend Ember Sector instead of destroying it."

codes:
  - id: start
    type: start
    title: "Pilot Registration"
    label: "Start Here"
    description: "Choose your pilot callsign and enter the neon battlefield."
    clue: "Seek the glowing data beacon where old legends are uploaded."
    organizer_note: "Place this at the entrance or check-in table."

  - id: silver-sword
    type: weapon
    title: "VX Plasma Missile Launcher"
    label: "Weapon"
    description: "A heavy plasma launcher hums with charged missile pods and glowing reactor coils."
    clue: "The war machine cools its reactor systems near the stream."
    organizer_note: "On second hill"
    effects:
      attack: 3

  - id: cave-bat
    type: enemy
    title: "Hyper Bats"
    label: "Enemy"
    description: "Mechanical bats swarm overhead, firing red laser beams from their glowing eyes."
    clue: "An old pilot's visor is hidden closer to home."
    organizer_note: "At tree house"
    enemy:
      health: 10
      attack: 2
      armor: 0
    rewards:
      health: 2

  - id: oak-shield
    type: armor
    title: "NanoShield Barrier"
    label: "Armor"
    description: "An advanced energy shield projects a glowing blue defensive barrier around its user."
    clue: "A support drone waits where soft things rest."
    organizer_note: "In the trees"
    effects:
      armor: 2

  - id: pixie-companion
    type: companion
    title: "XR-7 Wing Drone"
    label: "Companion"
    description: "A nimble combat drone inspired by classic starfighters zips into formation beside you."
    clue: "The Hyper Bats have overtaken the abandoned outpost."
    organizer_note: "Fence at new neighborhood"
    effects:
      attack: 1
      health: 1

  - id: bridge-troll
    type: enemy
    title: "Mad Cat Assault Mech"
    label: "Enemy"
    description: "A towering Mad Cat mech stomps through the battlefield with missile pods and PPC cannons blazing."
    clue: "A crashed mech pilot was spotted near the giant tree by the baseball field."
    organizer_note: "At the big bridge"
    enemy:
      health: 18
      attack: 3
      armor: 1
    rewards:
      attack: 1
      health: 2

  - id: healing-potion
    type: healing
    title: "Nanite Repair Canister"
    label: "Healing"
    description: "Clouds of repair nanites rebuild damaged armor plating and restore systems."
    clue: "The cyber wolf stalks the lower sector fork."
    organizer_note: "On way down to creek"
    effects:
      health: 5

  - id: ash-wolf
    type: enemy
    title: "Cyber Fang Wolf"
    label: "Enemy"
    description: "A robotic wolf with chrome claws and burning optic sensors prowls the shadows."
    clue: "A hidden plasma blade lies along the route home."
    organizer_note: "At the creek circle start"
    enemy:
      health: 24
      attack: 4
      armor: 2
    rewards:
      armor: 1

  - id: star-helm
    type: armor
    title: "NeuroLink Visor Helmet"
    label: "Armor"
    description: "The visor overlays tactical targeting systems and enemy threat analysis across your vision."
    clue: "Friendly drones patrol nearby."
    organizer_note: "Just cross first bridge"
    effects:
      armor: 1
      health: 1

  - id: knight-companion
    type: companion
    title: "Ace Pilot Nova"
    label: "Companion"
    description: "A legendary arcade pilot in retro mech armor joins your squadron for the final mission."
    clue: "When fully upgraded, seek the Titan mech in its tower."
    organizer_note: "Place near party supplies, music, or arcade games."
    effects:
      attack: 1
      armor: 1

  - id: ember-dragon
    type: dragon
    title: "The Ember Overlord Titan"
    label: "Final Boss"
    description: "A skyscraper-sized war mech towers above Ember Sector, glowing with molten circuitry and plasma cannons."
    clue: "This is the final battle."
    organizer_note: "Place at the final destination."
    enemy:
      health: 45
      attack: 4
      armor: 5